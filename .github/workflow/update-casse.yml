name: Update Casse Recenti

on:
  workflow_dispatch:
  schedule:
    - cron: "50 1 * * *"
    - cron: "50 13 * * *"

permissions:
  contents: write

jobs:
  build-casse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify required files
        run: |
          test -f build_casse_recenti.py || (echo "Manca build_casse_recenti.py" && exit 1)

      - name: Run build_casse_recenti.py
        run: python build_casse_recenti.py

      - name: Commit updated casse_recenti.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add casse_recenti.json
          git diff --cached --quiet || git commit -m "Update casse_recenti.json"
          git push
